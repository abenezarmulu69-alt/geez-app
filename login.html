<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ግእዝ ቋንቋ | መግቢያ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@300;400;500;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --gold: #c8902a;
  --gold-light: #e8b84b;
  --bg: #0a0400;
  --bg-card: linear-gradient(135deg, #251200, #0a0400);
  --text: #f0e0c0;
}

body {
  background: var(--bg);
  font-family: 'Noto Serif Ethiopic', serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* Login Container */
.login-container {
  max-width: 400px;
  width: 100%;
  margin: 0 auto;
}

/* Cross Animation */
.cross {
  width: 70px;
  height: 70px;
  margin: 0 auto 20px;
  background: radial-gradient(circle, rgba(200,144,66,0.2), transparent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: pulse 1.5s ease infinite;
}
.cross svg { width: 45px; height: 45px; }
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.1); opacity: 1; }
}

/* Login Card */
.login-card {
  background: var(--bg-card);
  border: 1px solid rgba(200,144,66,0.3);
  border-radius: 28px;
  padding: 35px 25px;
  text-align: center;
}
.login-card h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 24px;
  color: var(--gold-light);
  margin-bottom: 5px;
}
.login-card .sub {
  font-size: 11px;
  color: var(--gold);
  opacity: 0.6;
  margin-bottom: 25px;
  letter-spacing: 2px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
  background: rgba(200,144,66,0.1);
  border-radius: 50px;
  padding: 5px;
}
.tab {
  flex: 1;
  padding: 12px;
  background: transparent;
  border: none;
  border-radius: 40px;
  color: rgba(200,144,66,0.6);
  font-size: 15px;
  cursor: pointer;
  font-family: inherit;
}
.tab.active {
  background: rgba(200,144,66,0.25);
  color: var(--gold-light);
}

/* Inputs */
.input {
  width: 100%;
  padding: 14px;
  background: rgba(200,144,66,0.08);
  border: 1px solid rgba(200,144,66,0.25);
  border-radius: 14px;
  color: var(--text);
  font-size: 14px;
  margin-bottom: 14px;
  outline: none;
  font-family: inherit;
}
.input:focus { border-color: var(--gold); }
.password-wrapper {
  position: relative;
}
.toggle-pwd {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--gold);
  font-size: 18px;
  cursor: pointer;
}
.btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #3a1e00, #251200);
  border: 1.5px solid var(--gold);
  border-radius: 14px;
  color: var(--gold-light);
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}
.btn:active { transform: scale(0.98); }
.error {
  font-size: 12px;
  color: #ef9a9a;
  text-align: center;
  margin-top: 12px;
  min-height: 40px;
}

/* Divine Message */
.message {
  margin-top: 20px;
  padding: 12px;
  background: rgba(200,144,66,0.05);
  border-left: 3px solid var(--gold);
  border-radius: 12px;
  text-align: center;
}
.message .text {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.4;
}
.message .small {
  font-size: 10px;
  color: rgba(200,144,66,0.6);
  margin-top: 5px;
}
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAcH6IWpeXq3YemyisYZtAdt2DoRSgAP38",
    authDomain: "geezapp-ff6e0.firebaseapp.com",
    projectId: "geezapp-ff6e0",
    storageBucket: "geezapp-ff6e0.firebasestorage.app",
    messagingSenderId: "713013615315",
    appId: "1:713013615315:web:42cfb7e7157351b8249226"
  };
  firebase.initializeApp(firebaseConfig);
</script>
</head>
<body>

<div class="login-container">
  <div class="cross">
    <svg viewBox="0 0 100 100" fill="none" stroke="#e8b84b" stroke-width="2.5">
      <line x1="50" y1="20" x2="50" y2="80"/>
      <line x1="20" y1="50" x2="80" y2="50"/>
      <circle cx="50" cy="50" r="18" fill="none"/>
      <circle cx="50" cy="50" r="8" fill="none"/>
    </svg>
  </div>
  
  <div class="login-card">
    <h1>ግእዝ ቋንቋ</h1>
    <div class="sub">ETHIOPIAN ORTHODOX · GE'EZ</div>
    
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="setMode('login')">ግባ</button>
      <button class="tab" id="tabRegister" onclick="setMode('register')">ተመዝገብ</button>
    </div>
    
    <input type="email" id="email" class="input" placeholder="Email አድራሻ">
    
    <div class="password-wrapper">
      <input type="password" id="password" class="input" placeholder="የሚስጥር ቁጥር">
      <button class="toggle-pwd" onclick="togglePassword()">👁️</button>
    </div>
    
    <input type="text" id="name" class="input" placeholder="ስምህ (ለምዝገባ)" style="display:none">
    
    <button class="btn" id="actionBtn" onclick="handleAuth()">ግባ</button>
    <div class="error" id="errorMsg"></div>
  </div>
  
  <div class="message">
    <div class="text">እስመ አልቦ ነገር ዘይሰአኖ ለእግዚአብሔር !</div>
    <div class="small">ምንም ነገር ለእግዚአብሔር አይከብድም</div>
  </div>
</div>

<script>
// ========== GLOBALS ==========
let isLoginMode = true;
const auth = firebase.auth();

// ========== AUTH UI ==========
function setMode(mode) {
  isLoginMode = (mode === 'login');
  const loginTab = document.getElementById('tabLogin');
  const regTab = document.getElementById('tabRegister');
  const nameField = document.getElementById('name');
  const actionBtn = document.getElementById('actionBtn');
  
  loginTab.classList.toggle('active', isLoginMode);
  regTab.classList.toggle('active', !isLoginMode);
  nameField.style.display = isLoginMode ? 'none' : 'block';
  actionBtn.textContent = isLoginMode ? 'ግባ' : 'ተመዝገብ';
  document.getElementById('errorMsg').textContent = '';
}

function togglePassword() {
  const pwd = document.getElementById('password');
  const btn = document.querySelector('.toggle-pwd');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    btn.textContent = '🙈';
  } else {
    pwd.type = 'password';
    btn.textContent = '👁️';
  }
}

function handleAuth() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const name = document.getElementById('name').value.trim();
  const errorDiv = document.getElementById('errorMsg');
  
  if (!email || !pass) {
    errorDiv.textContent = 'Email እና password ያስፈልጋል!';
    return;
  }
  
  const btn = document.getElementById('actionBtn');
  btn.textContent = '...';
  
  if (isLoginMode) {
    // LOGIN
    auth.signInWithEmailAndPassword(email, pass)
      .then(() => {
        alert('እንኳን ደህና መጣህ! 🎉');
      })
      .catch(e => {
        errorDiv.textContent = e.message;
        btn.textContent = 'ግባ';
      });
  } else {
    // REGISTER
    auth.createUserWithEmailAndPassword(email, pass)
      .then((userCred) => {
        if (name) userCred.user.updateProfile({ displayName: name });
        alert('አካውንት ተፈጥሯል! እንኳን ደህና መጣህ! 🎉');
      })
      .catch(e => {
        errorDiv.textContent = e.message;
        btn.textContent = 'ተመዝገብ';
      });
  }
}

// Clear form on load
document.getElementById('email').value = '';
document.getElementById('password').value = '';
document.getElementById('name').value = '';
</script>
</body>
</html>
