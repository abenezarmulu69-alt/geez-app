<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ግእዝ ቋንቋ | ዘመናዊ መማሪያ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@300;400;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --gold: #c8902a; --gold-l: #e8b84b; --bg: #0a0400; --text-main: #f0e0c0;
  --card-bg: linear-gradient(135deg, rgba(37,18,0,0.92), rgba(10,4,0,0.96));
  --card-border: rgba(200,144,42,0.18);
}
body.day {
  --bg: #f5f0e8; --text-main: #2c241a; --gold: #aa7a2a;
  --card-bg: linear-gradient(135deg, #ffffff, #f9f3e9);
  --card-border: rgba(100,70,30,0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); font-family: 'Noto Serif Ethiopic', serif; color: var(--text-main); transition: 0.3s; overflow-x: hidden; }

/* Splash Screen */
#sp { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
.sp-ring { width: 80px; height: 80px; border: 2px solid var(--gold); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Layout */
.app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.hdr { padding: 15px; background: var(--bg); border-bottom: 1px solid var(--card-border); position: sticky; top: 0; z-index: 100; }
.stats { display: flex; gap: 8px; margin-top: 10px; }
.stat { flex: 1; background: rgba(200,144,42,0.05); border: 1px solid var(--card-border); border-radius: 12px; padding: 8px; text-align: center; }
.stat .sn { font-weight: bold; color: var(--gold-l); }

/* Navigation */
.nav { display: flex; overflow-x: auto; background: var(--bg); border-bottom: 1px solid var(--card-border); scrollbar-width: none; }
.nb { padding: 12px 20px; border: none; background: none; color: var(--gold); opacity: 0.6; cursor: pointer; white-space: nowrap; font-weight: bold; }
.nb.on { opacity: 1; border-bottom: 3px solid var(--gold); }

/* Components */
.cnt { padding: 15px; flex: 1; }
.sec { display: none; animation: fadeIn 0.4s; }
.sec.on { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.wcard { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 15px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
.wcard:active { transform: scale(0.97); }
.wcg { font-size: 18px; font-weight: bold; color: var(--gold-l); }
.wcam { font-size: 14px; margin-top: 5px; opacity: 0.9; }

/* Search Box */
.search-box { background: rgba(200,144,42,0.1); border-radius: 25px; padding: 10px 20px; display: flex; align-items: center; margin-bottom: 15px; }
.search-box input { flex: 1; background: none; border: none; color: var(--text-main); outline: none; font-size: 14px; }

/* Auth Screens */
.auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 25px; padding: 30px; width: 100%; max-width: 350px; text-align: center; }
.auth-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--card-border); background: rgba(255,255,255,0.05); color: #fff; }
.auth-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<div id="sp"><div class="sp-ring"></div><div style="margin-top:20px; color:var(--gold);">በዝግጅት ላይ...</div></div>

<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <h2 style="color:var(--gold-l); font-family:'Cinzel Decorative';">ግእዝ ቋንቋ</h2>
    <p style="font-size:10px; margin-bottom:20px;">ETHIOPIAN ORTHODOX · GE'EZ</p>
    <input type="email" id="email" class="auth-input" placeholder="ኢሜይል">
    <input type="password" id="pass" class="auth-input" placeholder="የይለፍ ቃል">
    <button class="auth-btn" onclick="handleAuth()">ግባ / ተመዝገብ</button>
    <p id="auth-err" style="color:red; font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<div id="main-app" class="app-container" style="display:none;">
  <div class="hdr">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div><h2 style="color:var(--gold-l); font-size:16px;">ግእዝ ቋንቋ</h2></div>
      <div style="display:flex; gap:10px;">
        <button onclick="toggleDay()" style="background:none; border:none; font-size:20px; cursor:pointer;">☀️</button>
        <button onclick="logout()" style="background:none; border:none; font-size:20px; cursor:pointer;">🚪</button>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="sn" id="user-score">0%</div><div style="font-size:10px;">የመጨረሻ ውጤት</div></div>
      <div class="stat"><div class="sn" id="eth-date">---</div><div style="font-size:10px;">ዛሬ</div></div>
    </div>
  </div>

  <div class="nav">
    <button class="nb on" onclick="showTab('vocab', this)">ቃላት</button>
    <button class="nb" onclick="showTab('quiz', this)">ፈተና</button>
    <button class="nb" onclick="showTab('about', this)">ስለኛ</button>
  </div>

  <div class="cnt">
    <div id="vocab" class="sec on">
      <div class="search-box"><input type="text" id="q-search" placeholder="ቃላትን ይፈልጉ..." onkeyup="filterVocab()"></div>
      <div id="vocab-list"></div>
    </div>

    <div id="quiz" class="sec">
      <div id="q-box" class="wcard" style="text-align:center;">
        <p id="q-text" style="font-size:24px; font-weight:bold; color:var(--gold-l);"></p>
        <div id="q-options" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;"></div>
      </div>
      <button id="next-btn" class="auth-btn" style="display:none; margin-top:10px;" onclick="loadNextQuestion()">ቀጣይ</button>
    </div>

    <div id="about" class="sec">
        <div class="wcard" style="text-align:center;">
            <img src="https://img.sanishtech.com/u/9d0e391d6122336d556910da923ac707.png" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--gold);">
            <h3 style="margin-top:10px;">ዲያቆን አበነዘር ዘተዋህዶ</h3>
            <p style="font-size:13px; margin-top:10px;">ይህ አፕሊኬሽን የግእዝ ቋንቋን በቀላሉ ለመማር እንዲረዳ ታስቦ የተዘጋጀ ነው።</p>
        </div>
    </div>
  </div>
</div>

<script>
// Firebase Config (Replace with your actual config)
const firebaseConfig = {
    apiKey: "AIzaSyAanb1xTypN7kPgz5D981q9sSnue6SrpQI",
    authDomain: "geez-language-app.firebaseapp.com",
    projectId: "geez-language-app",
    storageBucket: "geez-language-app.firebasestorage.app",
    messagingSenderId: "131010600566",
    appId: "1:131010600566:web:1ccf5ff68051a3051a8957"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// App Data
const vocabData = [
    {g: 'እግዚአብሔር', m: 'ጌታ / አምላክ', p: 'Egziabher'},
    {g: 'ማርያም', m: 'ቅድስት ድንግል', p: 'Maryam'},
    {g: 'ሰላም', m: 'ሰላም / ጤና', p: 'Selam'},
    {g: 'ወንጌል', m: 'ምስራች', p: 'Wengel'},
    {g: 'ጸሎት', m: 'ልመና / ምስጋና', p: 'Tselot'},
    {g: 'ቅዱስ', m: 'ንጹህ / የተለየ', p: 'Qidus'}
];

// Initialization
auth.onAuthStateChanged(user => {
    document.getElementById('sp').style.opacity = '0';
    setTimeout(() => document.getElementById('sp').remove(), 800);
    
    if (user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        loadUserData(user.uid);
        renderVocab();
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('main-app').style.display = 'none';
    }
});

// UI Logic
function showTab(id, btn) {
    document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    btn.classList.add('on');
    if(id === 'quiz') startQuiz();
}

function toggleDay() { document.body.classList.toggle('day'); }

// Auth Logic
async function handleAuth() {
    const e = document.getElementById('email').value;
    const p = document.getElementById('pass').value;
    const err = document.getElementById('auth-err');
    try {
        await auth.signInWithEmailAndPassword(e, p);
    } catch (s) {
        try {
            await auth.createUserWithEmailAndPassword(e, p);
        } catch (e2) { err.innerText = e2.message; }
    }
}

function logout() { auth.signOut(); }

// Data Logic
async function loadUserData(uid) {
    const doc = await db.collection('users').doc(uid).get();
    if (doc.exists) {
        document.getElementById('user-score').innerText = (doc.data().lastScore || 0) + '%';
    }
}

function renderVocab(filter = '') {
    const list = document.getElementById('vocab-list');
    list.innerHTML = '';
    vocabData.filter(i => i.g.includes(filter) || i.m.includes(filter)).forEach(item => {
        list.innerHTML += `<div class="wcard" onclick="speak('${item.g}')">
            <div class="wcg">${item.g}</div>
            <div class="wcam">${item.m}</div>
            <div style="font-size:10px; color:var(--gold); opacity:0.6;">${item.p}</div>
        </div>`;
    });
}

function filterVocab() { renderVocab(document.getElementById('q-search').value); }

// Quiz Logic
let currentQ = 0, score = 0;
function startQuiz() {
    currentQ = 0; score = 0;
    loadNextQuestion();
}

function loadNextQuestion() {
    if (currentQ >= 5) { finishQuiz(); return; }
    const q = vocabData[Math.floor(Math.random() * vocabData.length)];
    document.getElementById('q-text').innerText = q.g;
    const options = [q.m, ...vocabData.filter(v => v.m !== q.m).sort(() => 0.5 - Math.random()).slice(0, 3).map(v => v.m)].sort(() => 0.5 - Math.random());
    
    const optBox = document.getElementById('q-options');
    optBox.innerHTML = '';
    options.forEach(o => {
        const b = document.createElement('button');
        b.className = 'wcard';
        b.style.margin = '0';
        b.innerText = o;
        b.onclick = () => checkAnswer(o, q.m, b);
        optBox.appendChild(b);
    });
    document.getElementById('next-btn').style.display = 'none';
}

function checkAnswer(selected, correct, btn) {
    if (selected === correct) { score++; btn.style.borderColor = 'green'; }
    else { btn.style.borderColor = 'red'; }
    document.querySelectorAll('#q-options button').forEach(b => b.disabled = true);
    document.getElementById('next-btn').style.display = 'block';
    currentQ++;
}

async function finishQuiz() {
    const pct = Math.round((score / 5) * 100);
    const uid = auth.currentUser.uid;
    await db.collection('users').doc(uid).set({ lastScore: pct, updatedAt: new Date() }, { merge: true });
    alert(`ፈተና አብቅቷል! ውጤትህ፡ ${pct}%`);
    document.getElementById('user-score').innerText = pct + '%';
    showTab('vocab', document.querySelector('.nb'));
}

function speak(text) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'am-ET';
    speechSynthesis.speak(u);
}

// Set Date
const d = new Date();
document.getElementById('eth-date').innerText = d.toLocaleDateString('am-ET');

</script>
</body>
</html>
