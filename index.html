<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0400">
<link rel="manifest" href="manifest.json">
<title>ግእዝ ቋንቋ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c8902a;--gold-l:#e8b84b;--gold-d:rgba(200,144,42,0.13);
  --bg:#0a0400;--bg2:#160800;--bg3:#251200;--bg4:#3a1e00;
  --parch:#f0e0c0;--r:13px;--r2:17px;
  --card-bg:linear-gradient(135deg,rgba(37,18,0,0.92),rgba(10,4,0,0.96));
  --card-border:rgba(200,144,42,0.18);
  --text-main:#f0e0c0;--text-sub:rgba(240,220,190,0.6);
}
body.day{
  --bg:#f5ead0;--bg2:#ede0c4;--bg3:#ddd0b0;--bg4:#c8b890;
  --parch:#2a1200;--card-bg:linear-gradient(135deg,rgba(255,245,230,0.95),rgba(245,235,215,0.98));
  --card-border:rgba(150,80,10,0.25);--text-main:#2a1200;--text-sub:rgba(42,18,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);transition:background 0.4s;}
body{font-family:'Noto Serif Ethiopic',serif;color:var(--parch);display:flex;flex-direction:column;max-width:440px;margin:0 auto;}
#cv{position:fixed;inset:0;pointer-events:none;z-index:0;}

#sp{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s;}
#sp.out{opacity:0;pointer-events:none;}
.sp-ring{width:110px;height:110px;border-radius:50%;border:1px solid rgba(200,144,42,0.2);display:flex;align-items:center;justify-content:center;animation:ri 1.2s ease forwards;}
@keyframes ri{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.sp-cw{animation:ci 1s 0.3s ease both;}
@keyframes ci{from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.sp-t{font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--gold-l);letter-spacing:2px;margin-top:20px;animation:ui 1s 0.6s ease both;}
.sp-s{font-size:10px;color:var(--gold);opacity:0.55;margin-top:6px;letter-spacing:4px;animation:ui 1s 0.9s ease both;font-family:'Cinzel',serif;}
.sp-b{width:130px;height:2px;background:rgba(200,144,42,0.12);border-radius:1px;margin-top:38px;overflow:hidden;animation:ui 0.4s 1.1s ease both;}
.sp-bf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));animation:bf 2.2s 1.1s ease forwards;}
@keyframes bf{from{width:0}to{width:100%}}
@keyframes ui{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.hdr{background:linear-gradient(180deg,#1c0c00 0%,var(--bg) 100%);border-bottom:1px solid rgba(200,144,42,0.22);padding:0.8rem 1rem 0.65rem;position:relative;z-index:20;flex-shrink:0;transition:background 0.4s;}
body.day .hdr{background:linear-gradient(180deg,#e8d4a0 0%,var(--bg) 100%);}
.hr{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;}
.hl h1{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--gold-l);letter-spacing:1px;line-height:1.2;}
body.day .hl h1{color:#8b4500;}
.hl p{font-size:8px;color:var(--gold);opacity:0.5;letter-spacing:3px;margin-top:2px;font-family:'Cinzel',serif;}
.hbtns{display:flex;gap:6px;}
.hbtn{width:33px;height:33px;border-radius:50%;background:var(--gold-d);border:1px solid rgba(200,144,42,0.22);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.hbtn:active{transform:scale(0.88);}
.hbtn.off{opacity:0.28;}
.stats{display:flex;gap:5px;}
.stat{flex:1;background:rgba(200,144,42,0.06);border:1px solid rgba(200,144,42,0.12);border-radius:8px;padding:4px 3px;text-align:center;}
.sn{font-size:14px;font-weight:700;color:var(--gold-l);}
body.day .sn{color:#8b4500;}
.sl{font-size:7.5px;color:var(--gold);opacity:0.55;margin-top:1px;}

.nav{display:flex;background:var(--bg2);border-bottom:1px solid rgba(200,144,42,0.1);flex-shrink:0;z-index:20;overflow-x:auto;scrollbar-width:none;transition:background 0.4s;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;padding:8px 9px 6px;background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(200,144,42,0.3);font-family:'Noto Serif Ethiopic',serif;font-size:11px;cursor:pointer;transition:all 0.2s;margin-bottom:-1px;white-space:nowrap;}
.nb.on{color:var(--gold-l);border-bottom-color:var(--gold-l);}
body.day .nb.on{color:#8b4500;border-bottom-color:#8b4500;}

.cnt{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;padding:0.75rem;scrollbar-width:thin;scrollbar-color:rgba(200,144,42,0.15) transparent;}
.cnt::-webkit-scrollbar{width:2px;}
.cnt::-webkit-scrollbar-thumb{background:rgba(200,144,42,0.15);}
.sec{display:none;animation:ui 0.3s ease;}
.sec.on{display:block;}
.slbl{font-size:8.5px;letter-spacing:2px;color:rgba(200,144,42,0.42);font-family:'Cinzel',serif;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.slbl::after{content:'';flex:1;height:0.5px;background:linear-gradient(90deg,rgba(200,144,42,0.22),transparent);}
body.day .slbl{color:rgba(120,60,0,0.6);}

/* WUDASE PLAYER */
.wp{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r2);padding:1.1rem;margin-bottom:1rem;position:relative;overflow:hidden;transition:all 0.4s;}
.wn{display:flex;align-items:center;gap:12px;margin-bottom:0.9rem;}
.wi{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--bg3),var(--bg4));border:2px solid rgba(200,144,42,0.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.wdisc{animation:spin 8s linear infinite;}
.wdisc.paused{animation-play-state:paused;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.wfi{position:absolute;}
.winfo{flex:1;min-width:0;}
.wday{font-size:8.5px;color:var(--gold);opacity:0.55;letter-spacing:1.5px;font-family:'Cinzel',serif;margin-bottom:2px;}
.wname{font-size:14px;font-weight:600;color:var(--gold-l);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
body.day .wname{color:#8b4500;}
.wsub{font-size:10px;color:rgba(200,144,42,0.45);margin-top:2px;}
.wpb{height:2.5px;background:rgba(200,144,42,0.1);border-radius:2px;position:relative;cursor:pointer;margin-bottom:4px;}
.wpf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:2px;width:0%;transition:width 0.25s;}
.wtime{display:flex;justify-content:space-between;font-size:9px;color:rgba(200,144,42,0.35);font-family:'Cinzel',serif;margin-bottom:10px;}
.wctrl{display:flex;align-items:center;justify-content:center;gap:14px;}
.wc{width:34px;height:34px;border-radius:50%;background:rgba(200,144,42,0.07);border:1px solid rgba(200,144,42,0.18);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;}
.wc:active{transform:scale(0.86);}
.wc.main{width:48px;height:48px;background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1.5px solid var(--gold);}
.wlist{margin-top:9px;}
.witem{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:9px;cursor:pointer;transition:all 0.15s;border:1px solid transparent;margin-bottom:4px;}
.witem:active{transform:scale(0.97);}
.witem.on{background:rgba(200,144,42,0.09);border-color:rgba(200,144,42,0.2);}
.winum{width:22px;height:22px;border-radius:50%;background:rgba(200,144,42,0.08);border:1px solid rgba(200,144,42,0.18);display:flex;align-items:center;justify-content:center;font-size:9.5px;color:var(--gold);flex-shrink:0;font-family:'Cinzel',serif;}
.winum.on{background:rgba(200,144,42,0.22);border-color:var(--gold);}
.wiinfo{flex:1;min-width:0;}
.winame{font-size:12px;color:var(--text-main);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.widay{font-size:9.5px;color:rgba(200,144,42,0.4);font-family:'Cinzel',serif;margin-top:1px;}
.wibars{display:flex;gap:1.5px;align-items:center;height:11px;flex-shrink:0;}
.wib{width:2px;background:var(--gold);border-radius:1px;}
@keyframes wb{0%,100%{transform:scaleY(0.25);}50%{transform:scaleY(1);}}
.wib.b1{animation:wb 0.55s ease infinite;}
.wib.b2{animation:wb 0.55s 0.12s ease infinite;}
.wib.b3{animation:wb 0.55s 0.22s ease infinite;}

/* CARDS */
.wcard{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:0.8rem 0.9rem;margin-bottom:8px;position:relative;overflow:hidden;cursor:pointer;transition:all 0.18s;}
.wcard::before{content:'';position:absolute;top:0;left:0;width:2.5px;height:100%;background:var(--ac,var(--gold));border-radius:var(--r) 0 0 var(--r);}
.wcard:active{transform:scale(0.98);}
.wct{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;}
.wcg{font-size:22px;font-weight:600;color:var(--gold-l);line-height:1.1;}
body.day .wcg{color:#8b4500;}
.wcr{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.wbdg{font-size:8.5px;padding:2px 6px;border-radius:20px;font-family:'Cinzel',serif;white-space:nowrap;}
.bn{background:rgba(26,92,42,0.18);color:#3a8a3a;border:1px solid rgba(26,92,42,0.32);}
.bv{background:rgba(139,26,26,0.18);color:#a03030;border:1px solid rgba(139,26,26,0.32);}
.ba{background:rgba(26,60,139,0.18);color:#3060a0;border:1px solid rgba(26,60,139,0.32);}
body:not(.day) .bn{color:#7fd47f;}
body:not(.day) .bv{color:#e88;}
body:not(.day) .ba{color:#88aaee;}
.ab{width:26px;height:26px;border-radius:50%;background:var(--gold-d);border:1px solid rgba(200,144,42,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--gold);}
.ab:active{transform:scale(0.82);}
.wclat{font-size:9.5px;color:rgba(200,144,42,0.42);font-family:'Cinzel',serif;letter-spacing:0.8px;margin:3px 0;}
.wcam{font-size:11px;color:var(--text-main);background:rgba(0,0,0,0.08);border-radius:6px;padding:5px 7px;margin-top:4px;}
body.day .wcam{background:rgba(0,0,0,0.05);}
.wcen{font-size:9.5px;color:var(--text-sub);margin-top:3px;padding-left:6px;border-left:1.5px solid rgba(200,144,42,0.18);font-style:italic;font-family:'Cinzel',serif;}

.pcard{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:0.8rem 0.9rem;margin-bottom:7px;cursor:pointer;transition:all 0.15s;}
.pcard:active{transform:scale(0.98);}
.pcg{font-size:15px;font-weight:600;color:var(--gold-l);margin-bottom:2px;}
body.day .pcg{color:#8b4500;}
.pcam{font-size:11px;color:var(--text-main);margin-bottom:1px;}
.pcen{font-size:9.5px;color:var(--text-sub);font-style:italic;font-family:'Cinzel',serif;}
.pcab{display:inline-flex;align-items:center;gap:4px;margin-top:5px;padding:3px 8px;background:var(--gold-d);border:1px solid rgba(200,144,42,0.18);border-radius:20px;font-size:9.5px;color:var(--gold);}

.gc{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:0.85rem 0.9rem;margin-bottom:8px;}
.gch{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.gcn{width:22px;height:22px;border-radius:50%;background:var(--gold-d);border:1px solid rgba(200,144,42,0.28);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gold-l);font-weight:600;}
body.day .gcn{color:#8b4500;}
.gct{font-size:12.5px;font-weight:600;color:var(--gold-l);}
body.day .gct{color:#8b4500;}
.gcs{font-size:8.5px;color:var(--gold);opacity:0.45;font-family:'Cinzel',serif;letter-spacing:1px;margin-bottom:7px;}
.gcb{font-size:11px;color:var(--text-sub);line-height:1.7;margin-bottom:7px;}
.exr{border-left:1.5px solid var(--gold);padding:4px 8px;margin:3px 0;background:rgba(200,144,42,0.04);border-radius:0 6px 6px 0;}
.exg{font-size:14px;color:var(--gold-l);}
body.day .exg{color:#8b4500;}
.exa{font-size:10.5px;color:var(--text-sub);}
.exe{font-size:9.5px;color:var(--text-sub);opacity:0.6;font-style:italic;font-family:'Cinzel',serif;}

/* QUIZ */
.qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;}
.qpbar{flex:1;height:2.5px;background:rgba(200,144,42,0.1);border-radius:2px;overflow:hidden;margin:0 9px;}
.qpf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:2px;transition:width 0.4s;}
.qnum{font-size:9.5px;color:var(--gold);min-width:32px;}
.qsc{font-size:9.5px;color:var(--gold-l);min-width:38px;text-align:right;}
body.day .qsc{color:#8b4500;}
.qcard{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r2);padding:1.2rem 0.95rem 0.95rem;transition:all 0.4s;}
.qql{font-size:8.5px;letter-spacing:2.5px;color:rgba(200,144,42,0.32);font-family:'Cinzel',serif;text-align:center;margin-bottom:9px;}
.qw{font-size:26px;font-weight:700;color:var(--gold-l);text-align:center;min-height:42px;display:flex;align-items:center;justify-content:center;}
body.day .qw{color:#8b4500;}
.qhint{font-size:9.5px;color:rgba(200,144,42,0.32);text-align:center;font-family:'Cinzel',serif;letter-spacing:1.2px;margin:4px 0 0.8rem;}
.qabt{display:flex;align-items:center;gap:4px;margin:0 auto 0.75rem;padding:5px 11px;background:var(--gold-d);border:1px solid rgba(200,144,42,0.18);border-radius:20px;cursor:pointer;font-size:9.5px;color:var(--gold);width:fit-content;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:0.75rem;}
.ch{padding:11px 7px;border:1px solid var(--card-border);border-radius:9px;background:rgba(0,0,0,0.05);color:var(--text-main);font-family:'Noto Serif Ethiopic',serif;font-size:11px;text-align:center;cursor:pointer;transition:all 0.15s;line-height:1.3;}
.ch:active{transform:scale(0.94);}
.ch.ok{background:rgba(26,92,42,0.22);border-color:#4caf50;color:#2d7a2d;animation:cok 0.3s ease;}
.ch.no{background:rgba(139,26,26,0.22);border-color:#f44336;color:#a02020;animation:cno 0.3s ease;}
body:not(.day) .ch.ok{color:#a5d6a7;}
body:not(.day) .ch.no{color:#ef9a9a;}
@keyframes cok{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
@keyframes cno{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
.qfb{text-align:center;font-size:11.5px;min-height:17px;margin-bottom:6px;}
.nxt{width:100%;padding:10px;background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--gold);border-radius:9px;color:var(--gold-l);font-family:'Noto Serif Ethiopic',serif;font-size:12.5px;cursor:pointer;display:none;}
body.day .nxt{background:linear-gradient(135deg,#ddd0b0,#ede0c4);color:#8b4500;}
.nxt:active{transform:scale(0.98);}
.rbox{text-align:center;padding:1.6rem 0.9rem;}
.rsc{font-size:30px;font-weight:700;color:var(--gold-l);margin:0.8rem 0 0.4rem;font-family:'Cinzel',serif;}
body.day .rsc{color:#8b4500;}
.rst{font-size:18px;letter-spacing:5px;margin-bottom:0.4rem;}
.rmg{font-size:11px;color:var(--text-sub);line-height:1.7;margin-bottom:1.2rem;}
.rbtn{padding:9px 1.5rem;background:transparent;border:1px solid var(--gold);border-radius:9px;color:var(--gold-l);font-family:'Noto Serif Ethiopic',serif;font-size:12.5px;cursor:pointer;}
body.day .rbtn{color:#8b4500;}
.orn{text-align:center;color:var(--gold);font-size:12px;opacity:0.18;margin:4px 0 10px;letter-spacing:4px;}

/* ABOUT */
.about-photo{width:110px;height:110px;border-radius:50%;border:2.5px solid rgba(200,144,42,0.5);overflow:hidden;margin:0 auto 1rem;box-shadow:0 0 25px rgba(200,144,42,0.2);}
.about-photo img{width:100%;height:100%;object-fit:cover;}
.about-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r2);padding:1.3rem 1rem;margin-bottom:10px;text-align:center;transition:all 0.4s;}
.about-info-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:1rem;margin-bottom:10px;transition:all 0.4s;}
.about-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.about-icon{width:36px;height:36px;border-radius:50%;background:rgba(200,144,42,0.1);border:1px solid rgba(200,144,42,0.22);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.tg-box{margin-top:10px;padding:10px;background:rgba(200,144,42,0.06);border-radius:9px;border:1px solid rgba(200,144,42,0.15);}

/* LOGIN */
#login-wrap{position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
#login-wrap.hide{display:none;}
.login-cross{margin-bottom:1.2rem;}
.login-title{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold-l);letter-spacing:2px;margin-bottom:6px;text-align:center;}
.login-sub{font-size:10px;color:var(--gold);opacity:0.5;letter-spacing:3px;margin-bottom:1.5rem;font-family:'Cinzel',serif;text-align:center;}
.login-tabs{display:flex;gap:0;margin-bottom:1.2rem;background:rgba(200,144,42,0.08);border-radius:10px;padding:3px;}
.ltab{flex:1;padding:8px;background:transparent;border:none;border-radius:8px;color:rgba(200,144,42,0.45);font-family:'Noto Serif Ethiopic',serif;font-size:12px;cursor:pointer;transition:all 0.2s;}
.ltab.on{background:rgba(200,144,42,0.18);color:var(--gold-l);}
.login-form{width:100%;max-width:320px;}
.linput{width:100%;padding:12px 14px;background:rgba(200,144,42,0.06);border:1px solid rgba(200,144,42,0.2);border-radius:10px;color:var(--parch);font-family:'Noto Serif Ethiopic',serif;font-size:13px;margin-bottom:10px;outline:none;}
.linput:focus{border-color:var(--gold);}
.linput::placeholder{color:rgba(200,144,42,0.3);}
/* Password toggle wrapper */
.pwd-wrapper{position:relative;}
.toggle-pwd{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--gold);cursor:pointer;font-size:16px;padding:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.toggle-pwd:active{background:rgba(200,144,42,0.2);}
.lbtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1.5px solid var(--gold);border-radius:10px;color:var(--gold-l);font-family:'Noto Serif Ethiopic',serif;font-size:14px;cursor:pointer;margin-top:4px;transition:all 0.15s;}
.lbtn:active{transform:scale(0.98);}
.lerr{font-size:11px;color:#ef9a9a;text-align:center;min-height:18px;margin-top:6px;}
.lskip{font-size:10px;color:rgba(200,144,42,0.35);text-align:center;margin-top:14px;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:1px;}
.lskip:active{opacity:0.6;}
.user-badge{display:flex;align-items:center;gap:6px;background:rgba(200,144,42,0.1);border:1px solid rgba(200,144,42,0.2);border-radius:20px;padding:4px 10px;}
.user-badge span{font-size:10px;color:var(--gold);font-family:'Cinzel',serif;}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script>
