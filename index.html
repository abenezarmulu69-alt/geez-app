<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ግእዝ ቋንቋ | መማሪያ አፕ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Serif Ethiopic',serif;
  background:#0a0400;
  color:#f0e0c0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.container{
  max-width:400px;
  width:100%;
  background:linear-gradient(135deg,rgba(37,18,0,0.96),rgba(10,4,0,0.98));
  border:1px solid rgba(200,144,42,0.3);
  border-radius:28px;
  padding:32px 24px;
  text-align:center;
}
.logo svg{width:70px;height:70px;margin-bottom:16px;}
h1{font-family:'Cinzel Decorative',serif;font-size:22px;color:#e8b84b;letter-spacing:2px;}
.sub{font-size:10px;color:#c8902a;opacity:0.6;letter-spacing:3px;margin-bottom:28px;}
.tabs{display:flex;gap:8px;margin-bottom:24px;background:rgba(200,144,42,0.08);border-radius:50px;padding:4px;}
.tab{flex:1;padding:10px;background:transparent;border:none;border-radius:40px;color:rgba(200,144,42,0.5);font-size:14px;cursor:pointer;transition:all 0.2s;}
.tab.active{background:rgba(200,144,42,0.25);color:#e8b84b;}
.input-group{position:relative;margin-bottom:16px;}
input{width:100%;padding:14px 16px;background:rgba(200,144,42,0.08);border:1px solid rgba(200,144,42,0.25);border-radius:14px;color:#f0e0c0;font-size:14px;font-family:inherit;outline:none;}
input:focus{border-color:#e8b84b;}
.toggle-pwd{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#c8902a;cursor:pointer;font-size:16px;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#3a1e00,#251200);border:1.5px solid #e8b84b;border-radius:14px;color:#e8b84b;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;}
.btn:active{transform:scale(0.98);}
.google-btn{background:rgba(200,144,42,0.1);border-color:rgba(200,144,42,0.4);margin-top:12px;display:flex;align-items:center;justify-content:center;gap:10px;}
.demo-btn{background:transparent;border-color:rgba(200,144,42,0.3);margin-top:12px;}
.error{color:#ef9a9a;font-size:12px;min-height:32px;margin-top:12px;}
.success{color:#7fd47f;}
#mainApp{display:none;}
.welcome-icon{font-size:48px;margin-bottom:16px;}
.welcome-title{font-size:20px;color:#e8b84b;margin-bottom:12px;}
.welcome-text{font-size:13px;color:rgba(240,220,190,0.7);margin-bottom:20px;}
.feature-box{background:rgba(200,144,42,0.08);border-radius:16px;padding:16px;margin:16px 0;text-align:left;}
.feature-item{padding:8px 0;border-bottom:1px solid rgba(200,144,42,0.1);display:flex;align-items:center;gap:10px;}
.feature-item:last-child{border-bottom:none;}
.feature-icon{font-size:18px;}
.logout-btn{background:rgba(200,144,42,0.15);border-color:rgba(200,144,42,0.3);margin-top:20px;}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAcH6IWpeXq3YemyisYZtAdt2DoRSgAP38",
  authDomain: "geezapp-ff6e0.firebaseapp.com",
  projectId: "geezapp-ff6e0",
  storageBucket: "geezapp-ff6e0.firebasestorage.app",
  messagingSenderId: "713013615315",
  appId: "1:713013615315:web:42cfb7e7157351b8249226"
});
</script>
</head>
<body>

<div id="loginContainer" class="container">
  <div class="logo">
    <svg width="70" height="70" viewBox="0 0 70 70">
      <rect x="29" y="8" width="12" height="54" rx="5" fill="#e8b84b"/>
      <rect x="8" y="29" width="54" height="12" rx="5" fill="#e8b84b"/>
      <circle cx="35" cy="35" r="12" fill="#0a0400"/>
      <circle cx="35" cy="35" r="9" fill="none" stroke="#e8b84b" stroke-width="1.5"/>
      <circle cx="35" cy="35" r="4" fill="#e8b84b"/>
    </svg>
  </div>
  <h1>ግእዝ ቋንቋ</h1>
  <div class="sub">ETHIOPIAN ORTHODOX · GE'EZ</div>
  
  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="setMode('login')">ግባ</button>
    <button class="tab" id="tabSignup" onclick="setMode('signup')">ተመዝገብ</button>
  </div>
  
  <div id="loginForm">
    <div class="input-group">
      <input type="email" id="email" placeholder="Email አድራሻ">
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="የሚስጥር ቁጥር">
      <button class="toggle-pwd" onclick="togglePassword()">👁️</button>
    </div>
    <div class="input-group" id="nameGroup" style="display:none;">
      <input type="text" id="name" placeholder="ስምህ (አማራጭ)">
    </div>
    <button class="btn" id="actionBtn" onclick="doAuth()">ግባ</button>
    <button class="btn google-btn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#e8b84b" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#e8b84b" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#e8b84b" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#e8b84b" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      በGoogle ግባ
    </button>
    <button class="btn demo-btn" onclick="demoLogin()">✧ ያለ መግባት ሞክር ✧</button>
    <div id="errorMsg" class="error"></div>
  </div>
</div>

<div id="mainApp" class="container">
  <div class="welcome-icon">✨</div>
  <div class="welcome-title" id="welcomeName">እንኳን ደህና መጣህ!</div>
  <div class="welcome-text">በዚህ አፕልኬሽን ግእዝ ቋንቋን በቀላል እና ዘመናዊ መንገድ መማር ትችላለህ።</div>
  
  <div class="feature-box">
    <div class="feature-item"><span class="feature-icon">📖</span><span>ትምህርቶች (መራሕያን፣ ነባር፣ ንባብ፣ ግሥአርዕስት)</span></div>
    <div class="feature-item"><span class="feature-icon">🔊</span><span>የቃላት አጠራር (TTS)</span></div>
    <div class="feature-item"><span class="feature-icon">🎵</span><span>ውዳሴ ማርያም ዜማዎች</span></div>
    <div class="feature-item"><span class="feature-icon">🔢</span><span>የግእዝ ቁጥሮች</span></div>
    <div class="feature-item"><span class="feature-icon">📝</span><span>ምሳሌዎች እና ፈተና</span></div>
  </div>
  
  <div style="background:rgba(200,144,42,0.1);border-radius:16px;padding:16px;margin:16px 0;">
    <div style="font-size:18px;font-weight:bold;color:#e8b84b;">✨ ሙሉ ይዘቶችን ለማግኘት ✨</div>
    <div class="sub-price" style="font-size:16px;margin:8px 0;">ወርሃዊ ክፍያ: 199 ብር ብቻ!</div>
    <div style="font-size:11px;color:rgba(240,220,190,0.6);">ተጨማሪ ትምህርቶች፣ ኦዲዮ እና ፈተናዎች</div>
  </div>
  
  <button class="btn logout-btn" onclick="logout()">ውጣ</button>
</div>

<script>
let currentMode = 'login';
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    const name = user.displayName || user.email.split('@')[0];
    document.getElementById('welcomeName').textContent = `እንኳን ደህና መጣህ፣ ${name}!`;
    let s = parseInt(localStorage.getItem('str')||'0')+1;
    localStorage.setItem('str',s);
  } else {
    document.getElementById('loginContainer').style.display = 'block';
    document.getElementById('mainApp').style.display = 'none';
  }
});

function setMode(mode){
  currentMode = mode;
  const isLogin = mode === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabSignup').classList.toggle('active', !isLogin);
  document.getElementById('nameGroup').style.display = isLogin ? 'none' : 'block';
  document.getElementById('actionBtn').textContent = isLogin ? 'ግባ' : 'ተመዝገብ';
  document.getElementById('errorMsg').textContent = '';
}

function doAuth(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const name = document.getElementById('name').value.trim();
  const errorDiv = document.getElementById('errorMsg');
  
  if(!email || !password){
    errorDiv.textContent = 'Email እና የሚስጥር ቁጥር ያስፈልጋል!';
    return;
  }
  
  const btn = document.getElementById('actionBtn');
  btn.textContent = '...';
  errorDiv.textContent = '';
  
  if(currentMode === 'login'){
    auth.signInWithEmailAndPassword(email, password)
      .then(() => {})
      .catch(err => {
        errorDiv.textContent = err.message === 'Firebase: Error (auth/user-not-found).' 
          ? 'አካውንት አልተገኘም። በመጀመሪያ ይመዝገቡ!' 
          : err.message;
        btn.textContent = 'ግባ';
      });
  } else {
    auth.createUserWithEmailAndPassword(email, password)
      .then((userCred) => {
        if(name) userCred.user.updateProfile({displayName: name});
        errorDiv.style.color = '#7fd47f';
        errorDiv.textContent = 'አካውንት በተሳካ ሁኔታ ተፈጠረ! እየገቡ ነው...';
        setTimeout(() => errorDiv.textContent = '', 2000);
      })
      .catch(err => {
        errorDiv.style.color = '#ef9a9a';
        if(err.message.includes('email-already-in-use')) errorDiv.textContent = 'ይህ Email ቀድሞ ተመዝግቧል!';
        else if(err.message.includes('weak-password')) errorDiv.textContent = 'የሚስጥር ቁጥር ቢያንስ 6 ፊደል ይሁን!';
        else errorDiv.textContent = err.message;
        btn.textContent = 'ተመዝገብ';
      });
  }
}

function googleLogin(){
  const errorDiv = document.getElementById('errorMsg');
  errorDiv.textContent = 'Google እየተከፈተ ነው...';
  auth.signInWithPopup(provider)
    .catch(err => {
      errorDiv.textContent = err.message;
    });
}

function demoLogin(){
  const email = 'demo@geez.com';
  const password = 'demo123';
  const errorDiv = document.getElementById('errorMsg');
  errorDiv.textContent = 'ወደ ውስጥ እየገባ ነው...';
  
  auth.signInWithEmailAndPassword(email, password)
    .catch(() => {
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {})
        .catch(err => {
          errorDiv.textContent = 'የሙከራ መግቢያ አልተሳካም። እባክዎ አዲስ አካውንት ይፍጠሩ።';
        });
    });
}

function togglePassword(){
  const pwd = document.getElementById('password');
  const btn = document.querySelector('.toggle-pwd');
  if(pwd.type === 'password'){
    pwd.type = 'text';
    btn.textContent = '🙈';
  } else {
    pwd.type = 'password';
    btn.textContent = '👁️';
  }
}

function logout(){
  auth.signOut();
}
</script>
</body>
</html>
