<script>
// የቀደመው ሁሉ ስክሪፕት እዚህ ይቀጥላል

// ------------------ አዳዲስ / የተሻሻሉ ክፍሎች ------------------

// Password toggle
document.getElementById('togglePass').addEventListener('click', function() {
  const passInput = document.getElementById('lpass');
  if (passInput.type === 'password') {
    passInput.type = 'text';
    this.textContent = '🙈';
  } else {
    passInput.type = 'password';
    this.textContent = '👁️';
  }
});

// Google Sign-In
function googleSignIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .then(result => {
      currentUser = result.user;
      document.getElementById('login-wrap').classList.add('hide');
      updateUserBadge(result.user.email || result.user.displayName?.split(' ')[0] || 'ተጠቃሚ');
    })
    .catch(error => {
      document.getElementById('lerr').textContent = error.message.includes('popup') 
        ? 'Google መስኮት ተዘግቷል' 
        : (getErrMsg(error.code) || 'ስህተት ተፈጠረ');
    });
}

// Improved TTS - stop previous speech
function spk(t, card) {
  if (!sOn) return;
  
  window.speechSynthesis.cancel();   // ቀደምቶውን ሁሉ አቁም

  const ab = card ? card.querySelector('.ab,.pcab') : null;
  if (ab) {
    const ot = ab.textContent;
    ab.textContent = '♪';
    setTimeout(() => ab.textContent = ot, 1600);
  }

  if (playVoice(t)) return;

  if (!('speechSynthesis' in window)) return;

  const u = new SpeechSynthesisUtterance(t);
  u.lang = 'am-ET';
  u.rate = 0.6;
  u.pitch = 1.0;
  if (amVoice) u.voice = amVoice;
  speechSynthesis.speak(u);
}

// Ethiopian Date in header
function updateEthDate() {
  const today = new Date();
  const eth = EthiopianDateConverter.toEC(today.getFullYear(), today.getMonth() + 1, today.getDate());
  const months = ['መስከረም','ጥቅምት','ኅዳር','ታኅሣሥ','ጥር','የካቲት','መጋቢት','ሚያዝያ','ግንቦት','ሰኔ','ሐምሌ','ነሐሴ','ጳጉሜ'];
  const yearGeez = eth.year.toString().split('').map(d => '፩፪፫፬፭፮፯፰፱፲'[d-1] || d).join('');
  document.getElementById('ethDate').textContent = 
    `${months[eth.month - 1]} ${eth.day} ቀን ${yearGeez} ዓ/ም`;
}
updateEthDate();
