<style>
:root{
  --gold:#c8902a;--gold-l:#e8b84b;--gold-d:rgba(200,144,42,0.13);
  --bg:#0a0400;--bg2:#160800;--bg3:#251200;--bg4:#3a1e00;
  --parch:#f0e0c0;--r:13px;--r2:17px;
  --card-bg:linear-gradient(135deg,rgba(37,18,0,0.92),rgba(10,4,0,0.96));
  --card-border:rgba(200,144,42,0.18);
  --text-main:#f0e0c0;--text-sub:rgba(240,220,190,0.7);
}
body.day{
  --bg:#fef7e0;--bg2:#fff3d1;--bg3:#f7e9c4;--bg4:#eeddae;
  --parch:#2a2418;
  --card-bg:linear-gradient(135deg,rgba(255,250,235,0.98),rgba(255,245,225,0.98));
  --card-border:rgba(150,100,30,0.2);
  --text-main:#2c241a;
  --text-sub:rgba(44,36,26,0.75);
  --gold-l:#9b6a1c;
  --gold:#aa7a2a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);transition:background 0.4s;}
body{font-family:'Noto Serif Ethiopic',serif;color:var(--parch);display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
#cv{position:fixed;inset:0;pointer-events:none;z-index:0;}

#sp{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s;}
#sp.out{opacity:0;pointer-events:none;}
.sp-ring{width:110px;height:110px;border-radius:50%;border:1px solid rgba(200,144,42,0.2);display:flex;align-items:center;justify-content:center;animation:ri 1.2s ease forwards;}
@keyframes ri{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.sp-cw{animation:ci 1s 0.3s ease both;}
@keyframes ci{from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.sp-t{font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--gold-l);letter-spacing:2px;margin-top:20px;animation:ui 1s 0.6s ease both;}
.sp-s{font-size:10px;color:var(--gold);opacity:0.55;margin-top:6px;letter-spacing:4px;animation:ui 1s 0.9s ease both;font-family:'Cinzel',serif;}
.sp-b{width:130px;height:2px;background:rgba(200,144,42,0.12);border-radius:1px;margin-top:38px;overflow:hidden;animation:ui 0.4s 1.1s ease both;}
.sp-bf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));animation:bf 2.2s 1.1s ease forwards;}
@keyframes bf{from{width:0}to{width:100%}}
@keyframes ui{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.hdr{background:linear-gradient(180deg,#1c0c00 0%,var(--bg) 100%);border-bottom:1px solid rgba(200,144,42,0.22);padding:0.8rem 1rem 0.65rem;position:relative;z-index:20;flex-shrink:0;transition:background 0.4s;}
body.day .hdr{background:linear-gradient(180deg,#f5e7cf 0%,var(--bg) 100%);}
.hr{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;}
.hl h1{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--gold-l);letter-spacing:1px;line-height:1.2;}
.hl p{font-size:8px;color:var(--gold);opacity:0.5;letter-spacing:3px;margin-top:2px;font-family:'Cinzel',serif;}
.hbtns{display:flex;gap:6px;}
.hbtn{width:33px;height:33px;border-radius:50%;background:var(--gold-d);border:1px solid rgba(200,144,42,0.22);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.hbtn:active{transform:scale(0.88);}
.hbtn.off{opacity:0.28;}
.hbtn.notif-on{background:rgba(200,144,42,0.4);border-color:var(--gold-l);}
.logout-btn{background:rgba(200,144,42,0.2);border-color:rgba(200,144,42,0.4);}
.stats{display:flex;gap:5px;}
.stat{flex:1;background:rgba(200,144,42,0.06);border:1px solid rgba(200,144,42,0.12);border-radius:8px;padding:4px 3px;text-align:center;}
.sn{font-size:14px;font-weight:700;color:var(--gold-l);}
.sl{font-size:7.5px;color:var(--gold);opacity:0.55;margin-top:1px;}

.nav{display:flex;background:var(--bg2);border-bottom:1px solid rgba(200,144,42,0.1);flex-shrink:0;z-index:20;overflow-x:auto;scrollbar-width:none;transition:background 0.4s;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;padding:8px 9px 6px;background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(200,144,42,0.3);font-family:'Noto Serif Ethiopic',serif;font-size:11px;cursor:pointer;transition:all 0.2s;margin-bottom:-1px;white-space:nowrap;}
.nb.on{color:var(--gold-l);border-bottom-color:var(--gold-l);}
body.day .nb.on{color:#8b4500;border-bottom-color:#8b4500;}

.cnt{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;padding:0.75rem;scrollbar-width:thin;scrollbar-color:rgba(200,144,42,0.15) transparent;}
.cnt::-webkit-scrollbar{width:2px;}
.cnt::-webkit-scrollbar-thumb{background:rgba(200,144,42,0.15);}
.sec{display:none;animation:ui 0.3s ease;}
.sec.on{display:block;}
.slbl{font-size:8.5px;letter-spacing:2px;color:rgba(200,144,42,0.42);font-family:'Cinzel',serif;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.slbl::after{content:'';flex:1;height:0.5px;background:linear-gradient(90deg,rgba(200,144,42,0.22),transparent);}
body.day .slbl{color:rgba(120,60,0,0.6);}

/* LOGIN SCREEN */
#login-wrap{position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
#login-wrap.hide{display:none;}
.login-close{position:absolute;top:20px;right:20px;background:rgba(200,144,42,0.2);border:1px solid rgba(200,144,42,0.3);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gold);font-size:18px;transition:all 0.2s;}
.login-close:active{transform:scale(0.9);}
.login-cross{margin-bottom:1.2rem;}
.login-title{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold-l);letter-spacing:2px;margin-bottom:6px;text-align:center;}
.login-sub{font-size:10px;color:var(--gold);opacity:0.5;letter-spacing:3px;margin-bottom:1.5rem;font-family:'Cinzel',serif;text-align:center;}
.login-tabs{display:flex;gap:0;margin-bottom:1.2rem;background:rgba(200,144,42,0.08);border-radius:10px;padding:3px;}
.ltab{flex:1;padding:8px;background:transparent;border:none;border-radius:8px;color:rgba(200,144,42,0.45);font-family:'Noto Serif Ethiopic',serif;font-size:12px;cursor:pointer;transition:all 0.2s;}
.ltab.on{background:rgba(200,144,42,0.18);color:var(--gold-l);}
.login-form{width:100%;max-width:320px;}
.linput{width:100%;padding:12px 14px;background:rgba(200,144,42,0.06);border:1px solid rgba(200,144,42,0.2);border-radius:10px;color:var(--parch);font-family:'Noto Serif Ethiopic',serif;font-size:13px;margin-bottom:10px;outline:none;}
.linput:focus{border-color:var(--gold);}
.linput::placeholder{color:rgba(200,144,42,0.3);}
.pwd-wrapper{position:relative;}
.toggle-pwd{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--gold);cursor:pointer;font-size:16px;padding:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.toggle-pwd:active{background:rgba(200,144,42,0.2);}
.lbtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1.5px solid var(--gold);border-radius:10px;color:var(--gold-l);font-family:'Noto Serif Ethiopic',serif;font-size:14px;cursor:pointer;margin-top:4px;transition:all 0.15s;}
.lbtn:active{transform:scale(0.98);}
.lerr{font-size:11px;color:#ef9a9a;text-align:center;min-height:18px;margin-top:6px;}
</style>

<!-- LOGIN SCREEN -->
<div id="login-wrap">
  <div class="login-close" onclick="resetLoginForm()">✖</div>
  <svg class="login-cross" width="60" height="60" viewBox="0 0 60 60">
    <defs>
      <linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5c842"/><stop offset="100%" stop-color="#c8902a"/></linearGradient>
      <linearGradient id="lg2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f5c842"/><stop offset="100%" stop-color="#c8902a"/></linearGradient>
    </defs>
    <rect x="25" y="5" width="10" height="50" rx="4" fill="url(#lg1)"/>

  </div>

    <input class="linput" id="lemail" type="email" placeholder="Email አድራሻ"/>
    <div class="pwd-wrapper">
      <input class="linput" id="lpass" type="password" placeholder="የሚስጥር ቁጥር"/>
      <button type="button" class="toggle-pwd" onclick="togglePasswordVisibility()">👁️</button>
    </div>
    <input class="linput" id="lname" type="text" placeholder="ስምህ (ለምዝገባ ብቻ)" style="display:none"/>

<canvas id="cv"></canvas>

<div id="sp">
  <div class="sp-ring">
    <div class="sp-cw"><svg width="65" height="65" viewBox="0 0 65 65"><rect x="27" y="6" width="11" height="53" rx="4" fill="url(#g1)"/><rect x="6" y="27" width="53" height="11" rx="4" fill="url(#g2)"/><circle cx="32" cy="32" r="8" fill="#0a0400"/><circle cx="32" cy="32" r="6" fill="none" stroke="#e8b84b" stroke-width="1.4"/><circle cx="32" cy="32" r="2.2" fill="#e8b84b"/></svg></div>
  </div>
  <div class="sp-t">ግእዝ ቋንቋ</div>
  <div class="sp-s">ETHIOPIAN ORTHODOX · GE'EZ</div>
  <div class="sp-b"><div class="sp-bf"></div></div>
</div>

<script>
// ======================== BACKGROUND ========================
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let pts = [];
function initP(){
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  pts = [];
  for(let i=0;i<38;i++) pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.4+0.3,vx:(Math.random()-0.5)*0.18,vy:(Math.random()-0.5)*0.18,a:Math.random()*0.4+0.1});
}
function drawP(){
  ctx.clearRect(0,0,cv.width,cv.height);
  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0) p.x=cv.width; if(p.x>cv.width) p.x=0;
    if(p.y<0) p.y=cv.height; if(p.y>cv.height) p.y=0;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(200,144,42,${p.a})`; ctx.fill();
  });
  requestAnimationFrame(drawP);
}
initP(); drawP(); window.addEventListener('resize',initP);

// ======================== AUTH & LOGIN ========================
let loginMode = 'in';
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('login-wrap').classList.add('hide');
    document.body.style.display = 'flex';
    document.body.style.flexDirection = 'column';
    // Load main content after login
    loadMainContent();
  } else {
    document.getElementById('login-wrap').classList.remove('hide');
    document.body.style.display = 'flex';
  }
});

function switchTab(mode){
  loginMode = mode;
  document.getElementById('tab-in').classList.toggle('on', mode==='in');
  document.getElementById('tab-up').classList.toggle('on', mode==='up');
  document.getElementById('lbtn').textContent = mode==='in' ? 'ግባ' : 'ተመዝገብ';
  document.getElementById('lname').style.display = mode==='up' ? 'block' : 'none';
  document.getElementById('lerr').textContent = '';
}

function doAuth(){
  const email = document.getElementById('lemail').value.trim();
  const pass = document.getElementById('lpass').value;
  const name = document.getElementById('lname').value.trim();
  const err = document.getElementById('lerr');
  if(!email || !pass){ err.textContent='Email እና password ያስፈልጋል!'; return; }
  const btn = document.getElementById('lbtn');
  btn.textContent = '...';
  if(loginMode === 'in'){
    auth.signInWithEmailAndPassword(email, pass)
      .then(()=>{})
      .catch(e=>{ err.textContent = e.message; btn.textContent='ግባ'; });
  } else {
    auth.createUserWithEmailAndPassword(email, pass)
      .then((userCred) => {
        if(name) userCred.user.updateProfile({displayName:name});
      })
      .catch(e=>{ err.textContent = e.message; btn.textContent='ተመዝገብ'; });
  }
}

function togglePasswordVisibility(){
  const pwd = document.getElementById('lpass');
  const btn = document.querySelector('.toggle-pwd');
  if(pwd.type === 'password'){ pwd.type = 'text'; btn.textContent = '🙈'; }
  else{ pwd.type = 'password'; btn.textContent = '👁️'; }
}

function resetLoginForm(){
  document.getElementById('lemail').value = '';
  document.getElementById('lpass').value = '';
  document.getElementById('lname').value = '';
  document.getElementById('lerr').textContent = '';
}

function signOut(){ 
  auth.signOut().then(()=>{ 
    document.getElementById('login-wrap').classList.remove('hide'); 
    resetLoginForm();
  }); 
}

function loadMainContent(){
  // After login, load the main app interface
  document.body.innerHTML = `
    <div class="hdr">
      <div class="hr">
        <div class="hl"><h1>ግእዝ ቋንቋ</h1><p>ETHIOPIAN ORTHODOX · GE'EZ</p></div>
        <div class="hbtns">
          <button class="hbtn" id="dayBtn" onclick="toggleDay()"><svg id="dayIco" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.5" stroke="#c8902a" stroke-width="1.3"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.5 3.5l1 1M11.5 11.5l1 1M11.5 3.5l-1 1M4.5 11.5l-1 1" stroke="#c8902a" stroke-width="1.2" stroke-linecap="round"/></svg></button>
          <button class="hbtn" id="sndBtn" onclick="toggleSound()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 6H5L8 3.5v9L5 10H2V6z" stroke="#c8902a" stroke-width="1.3" stroke-linejoin="round"/><path d="M11 4.5c1 .9 1.6 2 1.6 3.2s-.6 2.3-1.6 3.2" stroke="#c8902a" stroke-width="1.3" stroke-linecap="round"/></svg></button>
          <button class="hbtn" id="notifBtn" onclick="requestNotificationPermission()" title="ማሳወቂያ"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2a2 2 0 0 1 2 2v1h1a3 3 0 0 1 3 3v3a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a3 3 0 0 1 3-3h1V4a2 2 0 0 1 2-2z" stroke="#c8902a" stroke-width="1.2"/><path d="M6 12v1a2 2 0 0 0 4 0v-1" stroke="#c8902a" stroke-width="1.2"/></svg></button>
          <button class="hbtn logout-btn" onclick="signOut()" title="ውጣ"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 1H2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M9 3l3 3-3 3M12 6H5" stroke="#c8902a" stroke-width="1.2" stroke-linecap="round"/></svg></button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="sn" id="ss">1</div><div class="sl">ቀናት</div></div>
        <div class="stat"><div class="sn" id="sw">100+</div><div class="sl">ቃላት</div></div>
        <div class="stat"><div class="sn" id="sc">0%</div><div class="sl">ውጤት</div></div>
        <div class="stat"><div class="sn">18</div><div class="sl">ትምህርቶች</div></div>
      </div>
    </div>
    <div class="nav">
      <button class="nb on" onclick="showTab('welcome',this)">መነሻ</button>
      <button class="nb" onclick="showTab('lessons',this)">ልምህ</button>
      <button class="nb" onclick="showTab('about',this)">ስለኛ</button>
    </div>
    <div class="cnt">
      <div id="welcome" class="sec on">
        <div class="slbl">እንኳን ደህና መጣህ!</div>
        <div class="about-card" style="text-align:center;padding:2rem;">
          <div style="font-size:48px;margin-bottom:1rem;">✨</div>
          <div style="font-size:18px;font-weight:bold;color:var(--gold-l);margin-bottom:1rem;">ወደ ግእዝ ቋንቋ መማሪያ እንኳን በደህና መጣህ!</div>
          <div style="font-size:12px;color:var(--text-sub);margin-bottom:1rem;">በዚህ አፕልኬሽን ግእዝ ቋንቋን በቀላል እና ዘመናዊ መንገድ መማር ትችላለህ።</div>
          <div class="sub-box" style="margin-top:1rem;">
            <div class="sub-price">ወርሃዊ ክፍያ: 199 ብር ብቻ!</div>
            <button class="sub-btn" onclick="alert('ክፍያ ስርዓት በቅርቡ ይጀምራል።')">አሁን ይመዝገቡ</button>
          </div>
        </div>
      </div>
      <div id="lessons" class="sec">

  // Re-initialize functions after loading content
  window.toggleDay = function() {
    document.body.classList.toggle('day');
    const ico = document.getElementById('dayIco');
    if(document.body.classList.contains('day')){
      ico.innerHTML = '<path d="M8 3a5 5 0 0 0 5 5 5 5 0 0 1-5 5 5 5 0 0 1 0-10z" fill="#c8902a"/>';
    } else {
      ico.innerHTML = '<circle cx="8" cy="8" r="3.5" stroke="#c8902a" stroke-width="1.3"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.5 3.5l1 1M11.5 11.5l1 1M11.5 3.5l-1 1M4.5 11.5l-1 1" stroke="#c8902a" stroke-width="1.2" stroke-linecap="round"/>';
    }
  };
  window.toggleSound = function() {
    sOn = !sOn;
    document.getElementById('sndBtn').classList.toggle('off', !sOn);
  };
  window.requestNotificationPermission = function() {
    if (!('Notification' in window)) { alert('ማሳወቂያ አይደገፍም'); return; }
    if (Notification.permission === 'granted') {
      new Notification('ሰላም!', { body: 'ማሳወቂያዎች ቀድሞውንም ነቅተዋል።' });
    } else if (Notification.permission !== 'denied') {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          new Notification('እንኳን ደስ አለዎት!', { body: 'አሁን ማሳወቂያዎችን ይቀበላሉ።' });
          document.getElementById('notifBtn').classList.add('notif-on');
        }
      });
    }
  };
  window.showTab = function(id, btn) {
    document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    btn.classList.add('on');
  };
  let sOn = true;
  // Splash removal
  setTimeout(()=>{
    const sp = document.getElementById('sp');
    if(sp) sp.classList.add('out');
  }, 500);
}

setTimeout(()=>{
