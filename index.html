<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ግእዝ ቋንቋ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c8902a; --bg:#0a0400; --bg2:#160800; --bg3:#251200;
  --parch:#f0e0c0; --gold-d:rgba(200,144,42,0.13); --r:13px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Noto Serif Ethiopic',serif}
body{margin:0;background:var(--bg);color:var(--parch);overflow-x:hidden}

/* --- Login & Register UI --- */
#auth-wrap { position:fixed; inset:0; background:var(--bg); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }
#auth-wrap.hide { display:none; }
.auth-card { width:100%; max-width:350px; text-align:center; }
.auth-card h2 { font-family:'Cinzel Decorative',serif; color:var(--gold); margin-bottom:20px; }
input { width:100%; background:var(--bg2); border:1px solid var(--gold-d); padding:15px; border-radius:var(--r); color:var(--parch); margin-bottom:12px; outline:none; }
input:focus { border-color:var(--gold); }
.pass-wrapper { position:relative; width:100%; }
.toggle-password { position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--gold); }
.main-btn { width:100%; background:var(--gold); border:none; padding:16px; border-radius:var(--r); font-weight:700; color:var(--bg); margin-top:10px; cursor:pointer; }
.switch-mode { margin-top:20px; font-size:13px; cursor:pointer; color:var(--gold); text-decoration:underline; }

/* --- Main UI --- */
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,4,0,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--gold-d);padding:12px 16px}
.hr{display:flex;justify-content:space-between;align-items:center;max-width:800px;margin:0 auto}
.hl h1{margin:0;font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold)}
.nav{display:flex;overflow-x:auto;padding:12px 16px;gap:10px;max-width:800px;margin:0 auto;scrollbar-width:none}
.nav::-webkit-scrollbar { display:none; }
.nb{flex:0 0 auto;background:var(--bg2);border:1px solid var(--gold-d);padding:10px 18px;border-radius:var(--r);color:var(--parch);font-size:13px;cursor:pointer}
.nb.on{background:var(--gold);color:var(--bg);font-weight:700}
.container{max-width:800px;margin:0 auto;padding:16px}
.sec{display:none}
.sec.on{display:block}
.card{background:var(--bg2);border:1px solid var(--gold-d);border-radius:15px;padding:20px;margin-bottom:15px}
/* Player */
.player{text-align:center}
.p-ctrls{display:flex;justify-content:center;align-items:center;gap:20px;margin-top:20px}
.p-play{width:60px;height:60px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;border:none}
</style>
</head>
<body>

<div id="auth-wrap">
  <div class="auth-card" id="login-form">
    <h2>ይግቡ (Login)</h2>
    <input type="email" id="le" placeholder="ኢሜይል (Email)">
    <div class="pass-wrapper">
      <input type="password" id="lp" placeholder="የይለፍ ቃል (Password)">
      <span class="toggle-password" onclick="togglePass('lp')">👁️</span>
    </div>
    <button class="main-btn" onclick="handleAuth('login')">ይግቡ</button>
    <p class="switch-mode" onclick="switchAuth(true)">አዲስ አካውንት ለመክፈት (Sign Up)</p>
    <p id="l-msg" style="color:#ff4444; font-size:12px; margin-top:10px;"></p>
  </div>

  <div class="auth-card" id="reg-form" style="display:none;">
    <h2>ተመዝገብ (Sign Up)</h2>
    <input type="email" id="re" placeholder="አዲስ ኢሜይል">
    <div class="pass-wrapper">
      <input type="password" id="rp" placeholder="አዲስ የይለፍ ቃል">
      <span class="toggle-password" onclick="togglePass('rp')">👁️</span>
    </div>
    <button class="main-btn" onclick="handleAuth('reg')">ይመዝገቡ</button>
    <p class="switch-mode" onclick="switchAuth(false)">አካውንት አለዎት? (Login)</p>
    <p id="r-msg" style="color:#ff4444; font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<div class="hdr">
  <div class="hr">
    <div class="hl"><h1>ግእዝ ቋንቋ</h1></div>
    <button class="nb" style="padding:5px 10px;" onclick="signOut()">ውጣ</button>
  </div>
</div>

<div class="nav">
  <button class="nb on" onclick="showTab('wudase',this)">ውዳሴ</button>
  <button class="nb" onclick="showTab('vocab',this)">ቃላት</button>
  <button class="nb" onclick="showTab('quiz',this)">ፈተና</button>
  <button class="nb" onclick="showTab('about',this)">ስለኛ</button>
</div>

<div class="container">
  <div id="wudase" class="sec on">
    <div class="card player">
      <h3 id="song-t">ውዳሴ ማርያም (ዘሰኑይ)</h3>
      <div class="p-ctrls">
        <button class="p-play" onclick="toggleT()">▶️</button>
      </div>
    </div>
  </div>

  <div id="vocab" class="sec">
    <div class="card"><h3>ቃላትን ይማሩ</h3><p>ዝርዝሮች እዚህ ይገባሉ...</p></div>
  </div>

  <div id="quiz" class="sec">
    <div class="card"><h3>የግእዝ ፈተና</h3><p>ጥያቄዎች እዚህ ይጀምራሉ...</p></div>
  </div>

  <div id="about" class="sec">
    <div class="card"><h3>ስለ መተግበሪያው</h3><p>ይህ አፕ የግእዝ ቋንቋን በቀላሉ ለመማር የተዘጋጀ ነው።</p></div>
  </div>
</div>

<audio id="aud" src="https://archive.org/download/Wudase_Maryam/Mon.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>

<script>
// Firebase Config - የእርስዎን እዚህ ይተኩ
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Password Toggle
function togglePass(id) {
  const p = document.getElementById(id);
  p.type = p.type === 'password' ? 'text' : 'password';
}

// Switch Login/Register
function switchAuth(isReg) {
  document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
  document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
}

// Auth Actions
function handleAuth(type) {
  const email = type === 'login' ? document.getElementById('le').value : document.getElementById('re').value;
  const pass = type === 'login' ? document.getElementById('lp').value : document.getElementById('rp').value;
  const msg = type === 'login' ? document.getElementById('l-msg') : document.getElementById('r-msg');

  if (type === 'login') {
    auth.signInWithEmailAndPassword(email, pass)
      .catch(e => msg.textContent = "ስህተት: " + e.message);
  } else {
    auth.createUserWithEmailAndPassword(email, pass)
      .catch(e => msg.textContent = "ስህተት: " + e.message);
  }
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('auth-wrap').classList.add('hide');
  } else {
    document.getElementById('auth-wrap').classList.remove('hide');
  }
});

function signOut() { auth.signOut(); }

// Tab Navigation & Audio Pause
const aud = document.getElementById('aud');
function showTab(id, btn) {
  if (id !== 'wudase') { aud.pause(); }
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function toggleT() {
  if (aud.paused) aud.play(); else aud.pause();
}
</script>
</body>
</html>
