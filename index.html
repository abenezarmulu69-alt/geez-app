<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Abyssinica | የግእዝ ተርጓሚ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@300;400;500;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
:root {
  --gold: #c8902a;
  --gold-l: #e8b84b;
  --bg: #0a0400;
  --bg2: #160800;
  --text: #f0e0c0;
}
body {
  background: var(--bg);
  font-family: 'Noto Serif Ethiopic', serif;
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}
/* Header */
.header {
  background: linear-gradient(180deg, #1c0c00 0%, var(--bg) 100%);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(200,144,66,0.2);
  position: relative;
  z-index: 10;
}
.logo h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 16px;
  color: var(--gold-l);
}
.logo p {
  font-size: 8px;
  color: var(--gold);
  opacity: 0.6;
  letter-spacing: 2px;
}
.header-buttons {
  display: flex;
  gap: 10px;
}
.header-btn {
  background: rgba(200,144,66,0.15);
  border: 1px solid rgba(200,144,66,0.3);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: var(--gold);
  transition: all 0.2s;
}
.header-btn:active {
  transform: scale(0.95);
}
/* WebView Container */
.webview-container {
  position: relative;
  width: 100%;
  height: calc(100vh - 70px);
  background: #fff;
}
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
.loading-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20;
  transition: opacity 0.3s;
}
.loading-spinner {
  width: 50px;
  height: 50px;
  border: 3px solid rgba(200,144,66,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.loading-text {
  margin-top: 15px;
  color: var(--gold);
  font-size: 14px;
}
.error-message {
  text-align: center;
  padding: 30px;
  color: #ef9a9a;
}
.error-message button {
  margin-top: 15px;
  background: var(--gold);
  border: none;
  padding: 8px 20px;
  border-radius: 25px;
  color: #0a0400;
  cursor: pointer;
  margin-right: 10px;
}
/* Info Bar */
.info-bar {
  background: rgba(200,144,66,0.08);
  padding: 8px 16px;
  text-align: center;
  font-size: 10px;
  color: var(--gold);
  border-top: 1px solid rgba(200,144,66,0.1);
}
.info-bar a {
  color: var(--gold-l);
  text-decoration: none;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <h1>ግእዝ ቋንቋ</h1>
    <p>ETHIOPIAN ORTHODOX · GE'EZ</p>
  </div>
  <div class="header-buttons">
    <div class="header-btn" onclick="refreshPage()">🔄</div>
    <div class="header-btn" onclick="goBack()">✖</div>
  </div>
</div>

<div class="webview-container" id="webviewContainer">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">⏳ Abyssinica እየተከፈተ ነው...</div>
    <div style="font-size: 12px; margin-top: 10px; opacity: 0.7;">በዓለም ላይ ብቸኛው የግእዝ ተርጓሚ</div>
  </div>
  <iframe 
    id="translatorFrame"
    src="https://www.abyssinica.ai/translator"
    sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-popups-to-escape-sandbox"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

<div class="info-bar">
  ✨ በዓለም ላይ ብቸኛው የግእዝ ተርጓሚ | 
  <a href="https://www.abyssinica.ai/translator" target="_blank">አማርኛ ↔ ግእዝ</a> | 
  ግእዝ ↔ እንግሊዝኛ | ነጻ
</div>

<script>
const iframe = document.getElementById('translatorFrame');
const loadingOverlay = document.getElementById('loadingOverlay');

// Hide loading when iframe loads
iframe.addEventListener('load', function() {
  setTimeout(() => {
    loadingOverlay.style.opacity = '0';
    setTimeout(() => {
      loadingOverlay.style.display = 'none';
    }, 300);
  }, 500);
});

// Error handling
iframe.addEventListener('error', function() {
  loadingOverlay.innerHTML = `
    <div class="error-message">
      <div style="font-size: 48px; margin-bottom: 15px;">🌐</div>
      <div>ገጹ መክፈት አልተቻለም</div>
      <div style="font-size: 12px; margin-top: 10px;">እባክዎ የበይነመረብ ግንኙነትዎን ያረጋግጡ</div>
      <button onclick="location.reload()">እንደገና ሞክር</button>
      <button onclick="window.open('https://www.abyssinica.ai/translator', '_blank')">በብራውዘር ክፈት</button>
    </div>
  `;
});

// Timeout fallback (10 seconds)
setTimeout(() => {
  if (loadingOverlay.style.display !== 'none' && loadingOverlay.style.opacity !== '0') {
    loadingOverlay.innerHTML = `
      <div class="error-message">
        <div style="font-size: 48px; margin-bottom: 15px;">⏰</div>
        <div>ገጹ ለመክፈት ጊዜ ወስዷል</div>
        <div style="font-size: 12px; margin-top: 10px;">እባክዎ እንደገና ይሞክሩ ወይም በብራውዘር ይክፈቱ</div>
        <button onclick="location.reload()">እንደገና ሞክር</button>
        <button onclick="window.open('https://www.abyssinica.ai/translator', '_blank')">በብራውዘር ክፈት</button>
      </div>
    `;
  }
}, 10000);

function refreshPage() {
  location.reload();
}

function goBack() {
  window.history.back();
}

// Handle messages from iframe (for potential future integration)
window.addEventListener('message', function(event) {
  if (event.origin === 'https://www.abyssinica.ai') {
    console.log('Message from Abyssinica:', event.data);
  }
});
</script>

</body>
</html>
