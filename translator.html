<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ግእዝ ተርጓሚ | AI Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@300;400;500;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
:root {
  --gold: #c8902a;
  --gold-l: #e8b84b;
  --bg: #0a0400;
  --card-bg: linear-gradient(135deg, #251200, #0a0400);
  --card-border: rgba(200,144,66,0.25);
  --text: #f0e0c0;
  --text-sub: #c0b0a0;
}
body {
  background: var(--bg);
  font-family: 'Noto Serif Ethiopic', serif;
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 500px;
  width: 100%;
  margin: 0 auto;
}
.header {
  text-align: center;
  margin-bottom: 30px;
}
.cross {
  width: 60px;
  height: 60px;
  margin: 0 auto 15px;
  background: radial-gradient(circle, rgba(200,144,66,0.2), transparent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: pulse 1.5s ease infinite;
}
.cross svg { width: 40px; height: 40px; }
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.1); opacity: 1; }
}
h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 24px;
  color: var(--gold-l);
  margin-bottom: 5px;
}
.sub {
  font-size: 11px;
  color: var(--gold);
  opacity: 0.6;
  letter-spacing: 2px;
}
.translator-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 24px;
  padding: 25px;
}
.slbl {
  font-size: 12px;
  color: var(--gold);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.slbl::after {
  content: '';
  flex: 1;
  height: 0.5px;
  background: linear-gradient(90deg, var(--gold), transparent);
}
textarea {
  width: 100%;
  padding: 15px;
  background: rgba(200,144,66,0.08);
  border: 1px solid rgba(200,144,66,0.25);
  border-radius: 16px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  resize: vertical;
  outline: none;
}
textarea:focus {
  border-color: var(--gold);
}
.output-box {
  background: rgba(200,144,66,0.05);
  border: 1px solid rgba(200,144,66,0.2);
  border-radius: 16px;
  padding: 15px;
  min-height: 120px;
  color: var(--gold-l);
  font-size: 16px;
  line-height: 1.5;
}
.btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #3a1e00, #251200);
  border: 1.5px solid var(--gold);
  border-radius: 14px;
  color: var(--gold-l);
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
  transition: all 0.2s;
}
.btn:active { transform: scale(0.98); }
.btn-group {
  display: flex;
  gap: 12px;
  margin-top: 15px;
}
.btn-group .btn {
  flex: 1;
  margin-top: 0;
}
.loading {
  display: none;
  text-align: center;
  padding: 15px;
  color: var(--gold);
  font-size: 14px;
}
.examples {
  margin-top: 20px;
  padding: 15px;
  background: rgba(200,144,66,0.05);
  border-radius: 16px;
}
.examples-title {
  font-size: 12px;
  color: var(--gold);
  margin-bottom: 10px;
}
.example-item {
  font-size: 12px;
  color: var(--text-sub);
  padding: 6px 0;
  cursor: pointer;
  border-bottom: 1px dashed rgba(200,144,66,0.2);
}
.example-item:hover {
  color: var(--gold-l);
}
.quote {
  text-align: center;
  margin-top: 20px;
  padding: 12px;
  border-left: 3px solid var(--gold);
  font-size: 12px;
  color: var(--gold);
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="cross">
      <svg viewBox="0 0 100 100" fill="none" stroke="#e8b84b" stroke-width="2.5">
        <line x1="50" y1="20" x2="50" y2="80"/>
        <line x1="20" y1="50" x2="80" y2="50"/>
        <circle cx="50" cy="50" r="18" fill="none"/>
        <circle cx="50" cy="50" r="8" fill="none"/>
      </svg>
    </div>
    <h1>ግእዝ ተርጓሚ</h1>
    <div class="sub">Amharic → Ge'ez Translator</div>
  </div>

  <div class="translator-card">
    <div class="slbl">📝 ግብዓት (Input)</div>
    <textarea id="inputText" rows="4" placeholder="አማርኛ ጽሑፍ ይጻፉ...&#10;&#10;ለምሳሌ: እግዚአብሔር ይባርክህ"></textarea>
    
    <div class="slbl" style="margin-top: 20px;">✨ ውጤት (Output)</div>
    <div id="outputText" class="output-box">ግእዝ ትርጉም እዚህ ይታያል</div>
    
    <div id="loading" class="loading">⏳ በAI እየተተረጎመ ነው... እባክዎ ይጠብቁ</div>
    
    <div class="btn-group">
      <button class="btn" onclick="translateText()">🤖 ተርጉም</button>
      <button class="btn" onclick="clearText()">🗑️ አጽዳ</button>
    </div>
    
    <div class="examples">
      <div class="examples-title">📖 ምሳሌ አረፍተ ነገሮች</div>
      <div class="example-item" onclick="setExample('እግዚአብሔር ይባርክህ')">• እግዚአብሔር ይባርክህ</div>
      <div class="example-item" onclick="setExample('ሰላም ለከ ማርያም')">• ሰላም ለከ ማርያም</div>
      <div class="example-item" onclick="setExample('እግዚአብሔር ታላቅ ነው')">• እግዚአብሔር ታላቅ ነው</div>
      <div class="example-item" onclick="setExample('ማርያም ቅድስት ድንግል ናት')">• ማርያም ቅድስት ድንግል ናት</div>
      <div class="example-item" onclick="setExample('ክርስቶስ ጌታችን ነው')">• ክርስቶስ ጌታችን ነው</div>
    </div>
  </div>
  
  <div class="quote">እስመ አልቦ ነገር ዘይሰአኖ ለእግዚአብሔር !</div>
</div>

<script>
// Hugging Face API Key
const HF_API_KEY = "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";

// Ge'ez dictionary for enhancement
const geEzDictionary = {
  "እግዚአብሔር": "እግዚአብሔር",
  "ይባርክህ": "ይባርከካ",
  "ሰላም": "ሰላም",
  "ማርያም": "ማርያም",
  "ቅድስት": "ቅድስት",
  "ድንግል": "ድንግል",
  "ታላቅ": "ዓቢይ",
  "ነው": "ውእቱ",
  "ናት": "ይእቲ",
  "ጌታ": "ጌታ",
  "ክርስቶስ": "ክርስቶስ",
  "ለከ": "ለከ",
  "ለኪ": "ለኪ",
  "አምላክ": "አምላክ",
  "መድኃኒት": "መድኀኒት"
};

// Full phrase patterns
const phrasePatterns = [
  { am: "እግዚአብሔር ይባርክህ", gez: "እግዚአብሔር ይባርከካ" },
  { am: "ሰላም ለከ", gez: "ሰላም ለከ" },
  { am: "ሰላም ለኪ", gez: "ሰላም ለኪ" },
  { am: "ሰላም ለከ ማርያም", gez: "ሰላም ለከ ማርያም" },
  { am: "እግዚአብሔር ታላቅ ነው", gez: "እግዚአብሔር ዓቢይ ውእቱ" },
  { am: "ማርያም ቅድስት ድንግል ናት", gez: "ማርያም ቅድስት ድንግል ይእቲ" },
  { am: "ክርስቶስ ጌታችን ነው", gez: "ክርስቶስ ጌታነ ውእቱ" }
];

async function translateText() {
  const inputText = document.getElementById('inputText').value.trim();
  const outputDiv = document.getElementById('outputText');
  const loadingDiv = document.getElementById('loading');
  
  if (!inputText) {
    outputDiv.innerHTML = 'እባክዎ አማርኛ ጽሑፍ ይጻፉ';
    return;
  }
  
  // Check if it matches a full phrase pattern
  for (let pattern of phrasePatterns) {
    if (inputText === pattern.am) {
      outputDiv.innerHTML = pattern.gez;
      return;
    }
  }
  
  loadingDiv.style.display = 'block';
  outputDiv.innerHTML = '🔄 በAI እየተተረጎመ ነው...';
  
  try {
    // Try to use Hugging Face API
    const response = await fetch('https://api-inference.huggingface.co/models/Helsinki-NLP/opus-mt-mul-en', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${HF_API_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        inputs: inputText,
        options: { wait_for_model: true }
      })
    });
    
    if (response.ok) {
      const result = await response.json();
      let translatedText = result[0]?.translation_text || inputText;
      
      // Enhance with Ge'ez dictionary
      for (let [am, gez] of Object.entries(geEzDictionary)) {
        translatedText = translatedText.replace(new RegExp(am, 'g'), gez);
      }
      
      outputDiv.innerHTML = translatedText;
    } else {
      // Fallback to dictionary-based translation
      outputDiv.innerHTML = dictionaryTranslate(inputText);
    }
    
  } catch (error) {
    console.error('Translation error:', error);
    outputDiv.innerHTML = dictionaryTranslate(inputText);
  } finally {
    loadingDiv.style.display = 'none';
  }
}

function dictionaryTranslate(text) {
  let result = text;
  for (let [am, gez] of Object.entries(geEzDictionary)) {
    result = result.replace(new RegExp(am, 'g'), gez);
  }
  
  // Handle special patterns
  if (result.includes("ይባርክህ") && !result.includes("ይባርከካ")) {
    result = result.replace("ይባርክህ", "ይባርከካ");
  }
  if (result.includes("ነው") && !result.includes("ውእቱ")) {
    result = result.replace("ነው", "ውእቱ");
  }
  if (result.includes("ናት") && !result.includes("ይእቲ")) {
    result = result.replace("ናት", "ይእቲ");
  }
  
  return result || 'ትርጉም አልተገኘም';
}

function clearText() {
  document.getElementById('inputText').value = '';
  document.getElementById('outputText').innerHTML = 'ግእዝ ትርጉም እዚህ ይታያል';
}

function setExample(text) {
  document.getElementById('inputText').value = text;
  translateText();
}
</script>
</body>
</html>
