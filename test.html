<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ግእዝ ቋንቋ - ሙከራ</title>
<style>
body {
  background: #0a0400;
  color: #e8b84b;
  font-family: 'Noto Serif Ethiopic', serif;
  text-align: center;
  padding: 2rem;
  margin: 0;
}
.container {
  max-width: 500px;
  margin: 0 auto;
  background: linear-gradient(135deg, #251200, #0a0400);
  border-radius: 20px;
  padding: 2rem;
  border: 1px solid #c8902a;
}
h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 24px;
  color: #e8b84b;
}
p {
  color: #f0e0c0;
  line-height: 1.6;
}
button {
  background: #c8902a;
  color: #0a0400;
  border: none;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 20px;
}
</style>
</head>
<body>
<div class="container">
  <h1>ግእዝ ቋንቋ</h1>
  <p>እንኳን ደህና መጣችሁ!<br>ይህ የሙከራ ገጽ ነው።<br>አፕሉ በትክክል እየሰራ ነው።</p>
  <button onclick="alert('ሰላም! አፕሉ ዝግጁ ነው')">ጠቅ አድርግ</button>
  <p style="margin-top: 20px; font-size: 12px;">አድራሻ: index.html እየሰራ አይደለም። ይህን ፋይል ወደ index.html መቀየር ያስፈልጋል።</p>
</div>
</body>
</html>
